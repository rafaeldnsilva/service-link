<!DOCTYPE html>
<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tela de Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#1d4ed8", // royal blue
            "background-light": "#f8fafc", // slate-50
            "background-dark": "#020617", // slate-950
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "1rem",
          },
        },
      },
    };
  </script>
<style>
    body {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: max(884px, 100dvh);
    }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="flex flex-col min-h-screen items-center justify-center p-6 sm:p-8">
<div class="w-full max-w-sm mx-auto flex flex-col items-center">
<div class="bg-primary w-16 h-16 rounded-full flex items-center justify-center mb-10">
<span aria-hidden="true" class="material-symbols-outlined text-white text-4xl">link</span>
</div>
<div class="text-center w-full mb-10">
<h1 class="text-3xl font-bold text-slate-900 dark:text-white">Bem-vindo de volta</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2">Faça login na sua conta ServiceLink</p>
</div>
<form class="w-full space-y-6">
<div>
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email</label>
<input class="mt-1 block w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-full shadow-sm placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-slate-900 dark:text-white" id="email" name="email" type="email" value="seuemail@exemplo.com"/>
</div>
<div>
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Senha</label>
<div class="relative mt-1">
<input class="block w-full px-4 py-3 pr-10 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-full shadow-sm placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-slate-900 dark:text-white" id="password" name="password" placeholder="Digite sua senha" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300" type="button">
<span aria-hidden="true" class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<div class="text-right">
<a class="text-sm font-medium text-primary hover:underline" href="#">Esqueceu sua senha?</a>
</div>
<button class="w-full bg-primary text-white font-bold py-3.5 px-4 rounded-full hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background-light dark:focus:ring-offset-background-dark focus:ring-primary shadow-lg shadow-blue-500/30" type="submit">
          Entrar
        </button>
</form>
<div class="flex items-center w-full my-8">
<hr class="w-full border-slate-300 dark:border-slate-700"/>
<span class="px-3 text-sm text-slate-500 dark:text-slate-400 whitespace-nowrap">Ou continue com</span>
<hr class="w-full border-slate-300 dark:border-slate-700"/>
</div>
<div class="w-full space-y-4">
<button class="w-full flex items-center justify-center bg-white border border-[#dadce0] dark:border-slate-600 rounded-full py-3 px-4 transition-colors hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-gray-200 gap-3" type="button">
<svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-[#3c4043] font-medium text-base font-display">Entrar com Google</span>
</button>
<button class="w-full flex items-center justify-center bg-black dark:bg-white text-white dark:text-black rounded-full py-3 px-4 transition-colors hover:bg-gray-900 dark:hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-gray-900 gap-3" type="button">
<svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74s2.57-.99 4.31-.82c.9.03 2.68.36 3.87 2.05-3.32 1.9-2.73 6.94 1.14 8.5C20.6 19.34 18.66 22 17.05 20.28z M12.03 7.25c-.19-2.29 1.68-4.34 3.97-4.53.25 2.57-2.31 4.54-3.97 4.53z"></path>
</svg>
<span class="font-medium text-base font-display">Entrar com Apple</span>
</button>
</div>
<div class="mt-10 text-center text-sm">
<span class="text-slate-500 dark:text-slate-400">Não tem uma conta?</span>
<a class="font-medium text-primary hover:underline" href="#">Cadastre-se</a>
</div>
</div>
</div>
</body></html>
