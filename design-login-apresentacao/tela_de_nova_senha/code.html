<!DOCTYPE html>

<html lang="pt"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tela de Nova Senha</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
      .material-symbols-outlined {
        font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
      }
    </style>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#007AFF",
              "background-light": "#F2F2F7",
              "background-dark": "#101622",
              "text-light": "#1C1C1E",
              "text-dark": "#F2F2F7",
              "placeholder": "#8E8E93",
              "error": "#FF3B30"
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="flex size-10 shrink-0 items-center justify-center text-text-light dark:text-text-dark">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</div>
<h1 class="text-text-light dark:text-text-dark text-lg font-bold flex-1 text-center pr-10">Definir Nova Senha</h1>
</div>
<div class="flex flex-col flex-grow px-4 pt-4">
<!-- Body Text -->
<p class="text-placeholder text-base font-normal leading-normal pb-8 pt-2 text-center">Crie uma senha nova e segura para sua conta.</p>
<!-- New Password Text Field -->
<div class="flex flex-col gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-text-light dark:text-text-dark text-base font-medium leading-normal pb-2">Nova Senha</p>
<div class="flex w-full flex-1 items-stretch rounded-lg shadow-sm">
<div class="text-placeholder flex border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 items-center justify-center pl-4 rounded-l-lg border-r-0">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-text-light dark:text-text-dark focus:outline-0 ring-1 ring-inset ring-slate-300 dark:ring-slate-700 focus:ring-2 focus:ring-inset focus:ring-primary bg-white dark:bg-slate-800 h-14 placeholder:text-placeholder p-[15px] border-none text-base font-normal leading-normal" placeholder="Digite sua nova senha" type="password" value=""/>
<div class="text-placeholder flex border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 items-center justify-center pr-4 rounded-r-lg border-l-0">
<span class="material-symbols-outlined">visibility_off</span>
</div>
</div>
</label>
</div>
<!-- Confirm New Password Text Field -->
<div class="flex flex-col gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-text-light dark:text-text-dark text-base font-medium leading-normal pb-2">Confirmar Nova Senha</p>
<div class="flex w-full flex-1 items-stretch rounded-lg shadow-sm">
<div class="text-placeholder flex border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 items-center justify-center pl-4 rounded-l-lg border-r-0">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-text-light dark:text-text-dark focus:outline-0 ring-1 ring-inset ring-slate-300 dark:ring-slate-700 focus:ring-2 focus:ring-inset focus:ring-primary bg-white dark:bg-slate-800 h-14 placeholder:text-placeholder p-[15px] border-none text-base font-normal leading-normal" placeholder="Confirme sua nova senha" type="password" value=""/>
<div class="text-placeholder flex border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 items-center justify-center pr-4 rounded-r-lg border-l-0">
<span class="material-symbols-outlined">visibility_off</span>
</div>
</div>
</label>
</div>
<!-- Password Requirements -->
<div class="pt-4 pb-3">
<ul class="text-placeholder text-sm font-normal leading-normal space-y-2">
<li class="flex items-center">
<span class="material-symbols-outlined text-base mr-2 text-green-500">check_circle</span>
                        Mínimo de 8 caracteres
                    </li>
<li class="flex items-center">
<span class="material-symbols-outlined text-base mr-2 text-placeholder">radio_button_unchecked</span>
                        Pelo menos um número
                    </li>
<li class="flex items-center">
<span class="material-symbols-outlined text-base mr-2 text-placeholder">radio_button_unchecked</span>
                        Pelo menos um símbolo
                    </li>
</ul>
</div>
</div>
<!-- Spacer -->
<div class="flex-grow"></div>
<!-- CTA Button -->
<div class="w-full p-4 pb-8 bg-background-light dark:bg-background-dark">
<button class="flex items-center justify-center w-full bg-primary text-white font-bold text-base h-14 rounded-lg shadow-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50">Redefinir Senha</button>
</div>
</div>
</body></html>
