<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<body class="font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden" style='font-family: Inter, "Noto Sans", sans-serif;'>
<div class="flex flex-col flex-1 w-full max-w-md mx-auto justify-between p-4">
<!-- Spacer for status bar -->
<div class="h-8"></div>
<!-- Main Content Area -->
<div class="flex flex-col items-center justify-center flex-1">
<!-- Image/Illustration -->
<div class="w-full grow bg-background-light dark:bg-background-dark @container py-3 max-w-sm">
<div class="w-full gap-1 overflow-hidden bg-background-light dark:bg-background-dark @[480px]:gap-2 aspect-square flex">
<div class="w-full bg-center bg-no-repeat bg-contain aspect-auto rounded-none flex-1" data-alt="Illustration showing a happy person next to a toolbox, representing professional services" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCLjqEpaKzMa0R1EsSDerCjmzq4xavnOx7Ir41iVmoPhOHLGOBdCFHJdFPoI-aEimPmxiu1fB5Jqrkw4siO-57JDWjSljlwXKxj570zI_9W0fsZ_TeD76AP__T2X7fVdjLxl1Aw583B29e02ItnZV1vRxf590RKGJc3x0UorKjiW3rVT6PqBhlqjQKFeyuowzU1ItuMLJfpE5sHy66uktX3KDQSEcwf4ykzMEoAB_VCRVlkQ5C93w9mzfTU0Dr7elknKTSiw-uH8Kyu"); background-position: center; border-radius: 9999px;'></div>
</div>
</div>
<!-- Text Content -->
<div class="w-full px-4 pt-6 pb-3">
<h1 class="text-[#111318] dark:text-white tracking-tight text-3xl font-bold text-center leading-tight">Comece Agora!</h1>
<p class="text-gray-600 dark:text-gray-400 text-base font-normal leading-normal text-center pt-2">
                        Encontre profissionais de confiança para resolver qualquer problema, a qualquer hora.
                    </p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex w-full justify-center pb-4">
<div class="flex flex-1 gap-3 max-w-[480px] flex-col items-stretch px-4 py-3">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] w-full shadow-md shadow-primary/30">
<span class="truncate">Criar Conta</span>
</button>
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 px-5 bg-background-light dark:bg-background-dark text-primary dark:text-primary text-base font-bold leading-normal tracking-[0.015em] w-full border border-primary/30 dark:border-primary/50">
<span class="truncate">Entrar</span>
</button>

</div>
</div>
