<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tela de Recuperação de Senha</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#007AFF",
              "background-light": "#F2F2F7",
              "background-dark": "#101622",
              "text-light-primary": "#1C1C1E",
              "text-light-secondary": "#8A8A8E",
              "text-dark-primary": "#F2F2F7",
              "text-dark-secondary": "#8D93A0",
              "border-light": "#D1D1D6",
              "border-dark": "#3A3A3C"
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.75rem",
              "xl": "1rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<div class="relative flex h-screen min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-y-auto">
<div class="flex flex-col flex-1">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-start">
<button class="text-text-light-primary dark:text-text-dark-primary flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined !text-2xl">arrow_back_ios_new</span>
</button>
</div>
<div class="flex-grow px-4">
<!-- Headline -->
<h1 class="text-text-light-primary dark:text-text-dark-primary tracking-tight text-[32px] font-bold leading-tight pt-6 pb-2 text-left">Recuperar Senha</h1>
<!-- Body Text -->
<p class="text-text-light-secondary dark:text-text-dark-secondary text-base font-normal leading-normal pb-8 pt-1">Insira seu email para receber um link de redefinição de senha.</p>
<!-- Text Field -->
<div class="flex w-full flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-text-light-primary dark:text-text-dark-primary text-base font-medium leading-normal pb-2">Email</p>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-light-secondary dark:text-text-dark-secondary !text-2xl pointer-events-none">mail</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-light dark:border-border-dark bg-white dark:bg-background-dark focus:border-primary h-14 placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary pl-12 pr-4 py-3 text-base font-normal leading-normal shadow-sm" placeholder="seuemail@exemplo.com" type="email" value=""/>
</div>
</label>
</div>
</div>
<!-- Action Buttons at the bottom -->
<div class="w-full px-4 pt-4 pb-12">
<!-- Single Button -->
<div class="flex py-3">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 flex-1 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] shadow-lg shadow-primary/30 active:scale-[0.98]">
<span class="truncate">Enviar Link</span>
</button>
</div>
<!-- Secondary Link -->
<div class="flex justify-center pt-4">
<a class="text-primary text-base font-medium leading-normal" href="#">Voltar ao Login</a>
</div>
</div>
</div>
</div>
</body></html>
