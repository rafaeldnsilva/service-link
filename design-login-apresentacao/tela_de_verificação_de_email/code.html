<!DOCTYPE html>

<html lang="pt"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tela de Verificação de Email</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1152d4",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<button class="text-[#1C1C1E] dark:text-white flex size-12 shrink-0 items-center justify-center rounded-xl">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
</div>
<div class="flex flex-1 flex-col justify-between px-4">
<div class="flex flex-col items-center pt-8">
<!-- Icon -->
<div class="flex items-center justify-center bg-primary/10 dark:bg-primary/20 rounded-full w-24 h-24 mb-8">
<span class="material-symbols-outlined text-primary dark:text-blue-300 text-5xl">mark_email_unread</span>
</div>
<!-- HeadlineText -->
<h1 class="text-[#1C1C1E] dark:text-white tracking-tight text-3xl font-bold leading-tight text-center pb-3">Verifique seu Email</h1>
<!-- BodyText -->
<p class="text-[#8A8A8E] dark:text-gray-400 text-base font-normal leading-relaxed text-center max-w-sm">
                    Enviamos um link para redefinir sua senha para <span class="font-semibold text-[#1C1C1E] dark:text-gray-300">seuemail@dominio.com</span>. Por favor, verifique sua caixa de entrada e spam.
                </p>
</div>
<div class="w-full pb-8 pt-4">
<!-- Primary Button -->
<div class="flex py-3">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 flex-1 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] shadow-lg shadow-primary/30">
<span class="truncate">Voltar ao Login</span>
</button>
</div>
<!-- Secondary Button/Link -->
<div class="flex py-2">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 flex-1 bg-transparent text-primary text-base font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Reenviar Email</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
