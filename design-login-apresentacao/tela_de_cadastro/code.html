<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Crie sua conta - ServiceLink</title>
    <!-- Tailwind CSS v3 with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#007AFF', // Primary blue from the button
                            gray: {
                                light: '#F8F9FA', // Background color
                                medium: '#6C757D', // Subtitle text color
                                dark: '#212529', // Heading and label color
                            },
                            border: '#E9ECEF' // Input border color
                        }
                    }
                }
            }
        }
    </script>
    <!-- Custom Styles for specific elements and icons -->
    <style data-purpose="custom-styles">
        /* Using a Google Font to better match the design */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        /* Style for the custom input icon positioning */
        .input-with-icon {
            position: relative;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            right: 1rem;
            /* 16px */
            transform: translateY(-50%);
            width: 1.25rem;
            /* 20px */
            height: 1.25rem;
            /* 20px */
            filter: grayscale(100%) opacity(0.5);
            /* Match icon color */
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-brand-gray-light text-brand-gray-dark">
    <div class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
        <!-- The main container for the registration form -->
        <main class="w-full max-w-sm">
            <!-- BEGIN: RegistrationHeader -->
            <header class="text-center mb-8">
                <!-- ServiceLink Logo and Name -->
                <div class="flex items-center justify-center gap-2 mb-8" data-purpose="logo-container">
                    <svg class="h-8 w-8 text-brand-blue" fill="none" stroke="currentColor" stroke-linecap="round"
                        stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.5 7.5L4 13l-1.5-1.5M14.5 16.5L20 11l1.5 1.5M7 11.5l2.5-2.5 M14.5 9l-2.5 2.5"></path>
                    </svg>
                    <span class="text-3xl font-bold text-brand-gray-dark">ServiceLink</span>
                </div>
                <!-- Page Title -->
                <h1 class="text-4xl font-bold mb-3">Crie sua conta</h1>
                <!-- Page Subtitle -->
                <p class="text-brand-gray-medium">Comece a conectar-se com provedores de serviço.</p>
            </header>
            <!-- END: RegistrationHeader -->
            <!-- BEGIN: RegistrationForm -->
            <form action="#" method="POST">
                <div class="space-y-6">
                    <!-- Full Name Field -->
                    <div>
                        <label class="block text-sm font-medium text-brand-gray-dark mb-1" for="full-name">Nome
                            Completo</label>
                        <input
                            class="w-full px-4 py-3 border border-brand-border rounded-xl bg-white focus:ring-brand-blue focus:border-brand-blue placeholder-gray-400"
                            id="full-name" name="full-name" placeholder="Digite seu nome completo" type="text" />
                    </div>
                    <!-- Email Field -->
                    <div>
                        <label class="block text-sm font-medium text-brand-gray-dark mb-1" for="email">Email</label>
                        <input
                            class="w-full px-4 py-3 border border-brand-border rounded-xl bg-white focus:ring-brand-blue focus:border-brand-blue placeholder-gray-400"
                            id="email" name="email" placeholder="Digite seu email" type="email" />
                    </div>
                    <!-- Password Field -->
                    <div class="input-with-icon">
                        <label class="block text-sm font-medium text-brand-gray-dark mb-1" for="password">Senha</label>
                        <input
                            class="w-full px-4 py-3 border border-brand-border rounded-xl bg-white focus:ring-brand-blue focus:border-brand-blue placeholder-gray-400"
                            id="password" name="password" placeholder="Crie uma senha" type="password" />
                        <!-- Visibility icon inside the input -->
                        <svg class="input-icon text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5"
                            style="color: #A0A0A0;" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                                stroke-linecap="round" stroke-linejoin="round"></path>
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round">
                            </path>
                        </svg>
                    </div>
                    <!-- Confirm Password Field -->
                    <div class="input-with-icon">
                        <label class="block text-sm font-medium text-brand-gray-dark mb-1"
                            for="confirm-password">Confirmar Senha</label>
                        <input
                            class="w-full px-4 py-3 border border-brand-border rounded-xl bg-white focus:ring-brand-blue focus:border-brand-blue placeholder-gray-400"
                            id="confirm-password" name="confirm-password" placeholder="Confirme sua senha"
                            type="password" />
                        <!-- Visibility icon inside the input -->
                        <svg class="input-icon text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5"
                            style="color: #A0A0A0;" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                                stroke-linecap="round" stroke-linejoin="round"></path>
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round">
                            </path>
                        </svg>
                    </div>
                    <!-- Submit Button -->
                    <button
                        class="w-full bg-brand-blue text-white font-semibold py-3.5 px-4 rounded-full hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-blue transition-colors"
                        style="border-color: #E0E0E0;" type="submit">
                        Criar Conta
                    </button>
                </div>
            </form>
            <!-- END: RegistrationForm -->
            <!-- BEGIN: SocialLogins -->
            <div class="mt-8">
                <!-- "OR" Separator -->
                <div class="relative flex items-center justify-center my-6">
                    <span class="bg-brand-gray-light px-2 text-sm text-gray-500">OU</span>
                </div>
                <div class="space-y-4">
                    <!-- Google Sign Up Button -->
                    <button
                        class="w-full flex items-center justify-center gap-3 bg-white border border-brand-border text-brand-gray-dark font-medium py-3.5 px-4 rounded-full hover:bg-gray-50 transition-colors"
                        style="border-color: #E0E0E0;">
                        <svg class="h-6 w-6" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4"></path>
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853"></path>
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05"></path>
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335"></path>
                            <path d="M1 1h22v22H1z" fill="none"></path>
                        </svg>
                        Cadastre-se com Google
                    </button>
                    <!-- Apple Sign Up Button -->
                    <button
                        class="w-full flex items-center justify-center gap-3 bg-black text-white font-medium py-3.5 px-4 rounded-full hover:bg-gray-800 transition-colors">
                        <svg class="h-6 w-6" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M10 3.33C8.08 3.33 6.36 4.35 5.56 5.85c-2.31.2-4.22 2.13-4.22 4.45 0 2.41 1.9 4.38 4.28 4.45.86 1.53 2.58 2.58 4.64 2.58 2.8 0 5.06-2.26 5.06-5.06 0-2.5-1.8-4.56-4.16-4.94.02-.12.02-.24.02-.37 0-1.8-1.46-3.26-3.26-3.26zM11.64 2.5c.34.03.68.08 1 .15-1.12-.66-2.43-1-3.79-1-1.2 0-2.3.26-3.28.72.63-.56 1.43-.91 2.31-.91.97 0 1.83.45 2.42 1.15.42-.08.84-.13 1.28-.15.02 0 .04 0 .06 0z">
                            </path>
                        </svg>
                        Cadastre-se com Apple
                    </button>
                </div>
            </div>
            <!-- END: SocialLogins -->
            <!-- BEGIN: LoginRedirect -->
            <div class="mt-12 text-center">
                <p class="text-sm text-gray-600">
                    Já tem uma conta?
                    <a class="font-semibold text-brand-blue hover:text-blue-500" href="#">Entrar</a>
                </p>
            </div>
            <!-- END: LoginRedirect -->
        </main>
    </div>
</body>

</html>
