<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tela de Seleção de Função</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#2C097F", "background-light": "#f6f6f8", "background-dark": "#151022"}, fontFamily: {display: "Inter"}, borderRadius: {DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px"}}}};</script>
<style>
    .material-symbols-outlined {
      font-variation-settings:
      'FILL' 0,
      'wght' 400,
      'GRAD' 0,
      'opsz' 24
    }
    .selected-card {
      outline: 2px solid #1152d4;
      box-shadow: 0 4px 12px rgba(17, 82, 212, 0.2);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-screen w-full flex-col group/design-root overflow-y-auto">
<!-- Top App Bar -->
<div class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="flex size-12 shrink-0 items-center justify-start">
<button class="flex items-center justify-center rounded-full h-10 w-10 bg-transparent text-[#111318] dark:text-white">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
</div>
<h2 class="text-[#111318] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Selecione sua função</h2>
<div class="flex w-12 items-center justify-end">
<!-- Placeholder for potential right-side icon -->
</div>
</div>
<!-- Body Text -->
<div class="px-4 pt-2 pb-4">
<p class="text-[#616f89] dark:text-gray-400 text-base font-normal leading-normal text-center">Como você usará o ServiceLink?</p>
</div>
<div class="flex-grow px-4 space-y-4">
<!-- Card 1: Cliente -->
<div class="group/card cursor-pointer">
<div class="flex flex-col items-start justify-start rounded-xl p-4 gap-4 shadow-[0_1px_3px_rgba(0,0,0,0.05)] bg-white dark:bg-gray-800/50 hover:shadow-lg transition-all border border-transparent dark:border-gray-700/50 group-focus/card:selected-card group-hover/card:border-primary/50 selected-card">
<div class="flex items-center justify-center size-12 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">person</span>
</div>
<div class="flex w-full grow flex-col items-stretch justify-center gap-1">
<p class="text-[#111318] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Cliente</p>
<p class="text-[#616f89] dark:text-gray-400 text-base font-normal leading-normal">Para contratar serviços e encontrar profissionais.</p>
</div>
</div>
</div>
<!-- Card 2: Prestador de Serviços -->
<div class="group/card cursor-pointer">
<div class="flex flex-col items-start justify-start rounded-xl p-4 gap-4 shadow-[0_1px_3px_rgba(0,0,0,0.05)] bg-white dark:bg-gray-800/50 hover:shadow-lg transition-all border border-transparent dark:border-gray-700/50 group-focus/card:selected-card group-hover/card:border-primary/50">
<div class="flex items-center justify-center size-12 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">construction</span>
</div>
<div class="flex w-full grow flex-col items-stretch justify-center gap-1">
<p class="text-[#111318] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Prestador de Serviços</p>
<p class="text-[#616f89] dark:text-gray-400 text-base font-normal leading-normal">Para oferecer seus serviços e encontrar clientes.</p>
</div>
</div>
</div>
</div>
<!-- Bottom Action Button -->
<div class="sticky bottom-0 w-full bg-background-light dark:bg-background-dark pt-4 pb-6 px-4">
<button class="flex w-full min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-5 mx-auto bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] shadow-lg shadow-primary/30 hover:bg-primary/90 focus:outline-none focus:ring-4 focus:ring-primary/50 transition-all">
<span class="truncate">Continuar</span>
</button>
</div>
</div>
</body></html>
