<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tela de Informações Pessoais</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#2C097F", "background-light": "#f6f6f8", "background-dark": "#151022", "text-primary": "#1C1C1E", "text-secondary": "#8E8E93", "border-color": "#E0E0E0"}, fontFamily: {display: "Inter"}, borderRadius: {DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px"}, boxShadow: {soft: "0 4px 12px 0 rgba(0, 122, 255, 0.15)"}}}};</script>
<style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-primary dark:text-background-light">
<div class="relative flex min-h-screen w-full flex-col">
<!-- Top App Bar -->
<header class="sticky top-0 z-10 flex h-16 w-full items-center border-b border-border-color/60 bg-background-light/80 px-4 backdrop-blur-sm dark:border-border-color/20 dark:bg-background-dark/80">
<div class="flex size-10 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-primary text-3xl">arrow_back_ios_new</span>
</div>
<h1 class="flex-1 text-center text-lg font-bold tracking-tight text-text-primary dark:text-white pr-10">Informações Pessoais</h1>
</header>
<!-- Main Content -->
<main class="flex flex-1 flex-col px-4 pt-8 pb-4">
<!-- Profile Header -->
<div class="flex w-full flex-col items-center gap-2 pb-8">
<button class="group relative">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 bg-gray-200 dark:bg-gray-700 flex items-center justify-center" data-alt="A light gray circular placeholder for a user's profile picture.">
<span class="material-symbols-outlined text-5xl text-gray-400 dark:text-gray-500">photo_camera</span>
</div>
</button>
<p class="text-primary text-lg font-semibold leading-tight">Adicionar Foto</p>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5">
<!-- Nome Completo -->
<label class="flex flex-col">
<p class="text-base font-medium text-text-primary dark:text-gray-300 pb-2">Nome Completo</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-border-color bg-white px-4 py-3.5 text-base font-normal leading-normal text-text-primary placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary" placeholder="Ex: Joana da Silva" value=""/>
</label>
<!-- Número de Telefone -->
<label class="flex flex-col">
<p class="text-base font-medium text-text-primary dark:text-gray-300 pb-2">Número de Telefone</p>
<div class="relative flex items-center">
<div class="absolute inset-y-0 left-0 flex items-center">
<button class="flex h-full items-center justify-center rounded-l-lg border-r border-border-color px-3 text-base font-medium text-text-primary dark:border-gray-600 dark:text-gray-300">
<span>🇧🇷 +55</span>
<span class="material-symbols-outlined text-lg text-text-secondary ml-1">expand_more</span>
</button>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-border-color bg-white py-3.5 pl-28 pr-4 text-base font-normal leading-normal text-text-primary placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary" placeholder="Ex: (11) 99999-9999" type="tel" value=""/>
</div>
</label>
<!-- Endereço Completo -->
<label class="flex flex-col">
<p class="text-base font-medium text-text-primary dark:text-gray-300 pb-2">Endereço Completo</p>
<div class="relative flex items-center">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-border-color bg-white py-3.5 pl-4 pr-10 text-base font-normal leading-normal text-text-primary placeholder:text-text-secondary focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary" placeholder="Comece a digitar seu endereço" value=""/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3">
<span class="material-symbols-outlined text-text-secondary">location_on</span>
</div>
</div>
</label>
</div>
<div class="flex-grow"></div>
<!-- CTA Button -->
<div class="mt-8 pb-4">
<button class="flex w-full items-center justify-center rounded-lg bg-primary px-6 py-4 text-lg font-bold text-white shadow-soft transition-transform duration-200 ease-in-out hover:scale-[1.02] active:scale-[0.98]">
                    Salvar e Continuar
                </button>
</div>
</main>
</div>
</body></html>
